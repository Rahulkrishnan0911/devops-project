- name: Deploy to Server
  uses: appleboy/ssh-action@v0.1.6
  with:
    host: ${{ secrets.SERVER_IP }}
    username: ubuntu
    key: ${{ secrets.SSH_KEY }}
    port: 22
    script: |
      echo "Connected"
      whoami
      cd /var/www/devops-project
      git pull origin main
      bash scripts/deploy.sh
